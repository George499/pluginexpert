name: DB admin (manual)

# Ручной read-only чек состояния БД/прода. Запуск: gh workflow run dbadmin.yml
# (или Actions → DB admin (manual) → Run workflow). В paths-ignore у deploy.yml,
# полный деплой не триггерит.

on:
  workflow_dispatch:

jobs:
  dbadmin:
    runs-on: ubuntu-latest
    steps:
      - name: DB / prod health check (read-only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          command_timeout: 3m
          script: |
            echo "=== владелец таблицы speakers (должен быть gen_user) ==="
            sudo -n -u postgres psql -d pluginexpert_db -tAc "select tableowner from pg_tables where schemaname='public' and tablename='speakers'" 2>&1 | head -2 || echo "нет доступа к postgres"
            echo "=== таблиц НЕ у gen_user ==="
            sudo -n -u postgres psql -d pluginexpert_db -tAc "select count(*) from pg_tables where schemaname='public' and tableowner <> 'gen_user'" 2>&1 | head -2 || true
            echo "=== API health ==="
            curl -s -o /dev/null -w "api/categories -> %{http_code}\n" "http://127.0.0.1:3010/api/categories?pagination%5BpageSize%5D=1" || true
            echo "=== бэкапы БД ==="
            ls -lh ~/db_backups/ 2>/dev/null | tail -5 || echo "нет бэкапов"
