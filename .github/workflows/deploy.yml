name: Deploy to production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/dbadmin.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          # npm ci бэкенда бывает медленным (~9 мин) + сборки + возможный откат.
          command_timeout: 30m
          script: |
            set -e

            # Загружаем nvm для non-interactive SSH (иначе npm/node не в PATH).
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ~/pluginexpert
            git fetch --all --prune
            git checkout main
            PREV=$(git rev-parse HEAD)   # рабочий коммит ДО обновления (для авто-отката)
            echo "Rollback-коммит: $PREV"
            git reset --hard origin/main

            # Полный откат бэкенда на прошлый рабочий коммит.
            rollback_backend() {
              echo "!!! Откат бэкенда на $PREV"
              cd ~/pluginexpert
              git reset --hard "$PREV"
              cd ~/pluginexpert/backend_strapi
              pm2 stop pluginexpert-backend || true
              npm ci
              npm run build
              pm2 restart pluginexpert-backend --update-env
              echo "!!! Откат завершён. Деплой провален (фронтенд не трогали)."
            }

            echo "=== Backend (Strapi) ==="
            cd ~/pluginexpert/backend_strapi
            npm ci

            # Останавливаем бэкенд ПЕРЕД сборкой: strapi build пересоздаёт build/,
            # и pm2-автрестарт, поймав полуготовый build/, уходит в краш-луп
            # (ENOENT build/index.html → strapi: not found). Стоп рвёт эту гонку.
            pm2 stop pluginexpert-backend || true
            npm run build

            # Без собранной админки strapi start падает в краш-луп — не стартуем битым.
            if [ ! -f build/index.html ]; then
              echo "!!! build/index.html не собрался."
              rollback_backend
              exit 1
            fi

            pm2 restart pluginexpert-backend --update-env

            # --- Health-check бэкенда + авто-откат ---
            # pm2 restart возвращает успех сразу; проверяем, что API реально отвечает 200.
            echo "=== Health-check бэкенда ==="
            BPORT=$(grep -E '^PORT=' ~/pluginexpert/backend_strapi/.env 2>/dev/null | head -1 | sed -E 's/^PORT=//; s/[^0-9]//g')
            BPORT=${BPORT:-3010}
            echo "Strapi порт: $BPORT"
            HEALTH_URL="http://127.0.0.1:${BPORT}/api/categories?pagination%5BpageSize%5D=1"
            ok=0
            for i in $(seq 1 20); do
              sleep 3
              code=$(curl -s --globoff -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
              echo "health-check попытка $i -> $code"
              if [ "$code" = "200" ]; then ok=1; break; fi
            done
            if [ "$ok" != "1" ]; then
              echo "!!! БЭКЕНД НЕ ПОДНЯЛСЯ. Логи ошибок Strapi:"
              pm2 logs pluginexpert-backend --err --lines 150 --nostream || true
              rollback_backend
              exit 1
            fi
            echo "Бэкенд отвечает 200 — ок."

            echo "=== Frontend (Next.js) ==="
            cd ~/pluginexpert/frontend
            npm ci
            npm run build
            pm2 restart pluginexpert-frontend --update-env

            pm2 list
            echo "=== Deploy complete ==="
