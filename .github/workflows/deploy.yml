name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ~/pluginexpert
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            echo "=== Backend (Strapi) ==="
            cd ~/pluginexpert/backend_strapi
            npm ci
            npm run build
            pm2 restart pluginexpert-backend --update-env

            echo "=== Frontend (Next.js) ==="
            cd ~/pluginexpert/frontend
            npm ci
            npm run build
            pm2 restart pluginexpert-frontend --update-env

            pm2 list
            echo "=== Deploy complete ==="
